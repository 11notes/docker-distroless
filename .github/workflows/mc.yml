name: mc
on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"
  push:
    tags:
      - 'mc'
jobs:
  mc:
    runs-on: ubuntu-latest
    steps:
      - name: cron-update / get latest version
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/minio/mc/releases/latest | jq -r '.tag_name' | sed 's|RELEASE.||')
          LATEST_VERSION_SEMVER=$(echo ${LATEST_VERSION} | sed 's|-|.|' | awk -F "T" '{print $1}')
          if [ "${LATEST_VERSION_SEMVER}" != "null" ]; then
            if curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/distroless/tags/mc-${LATEST_VERSION_SEMVER}; then
              echo "tag ${LATEST_VERSION_SEMVER} exists already!"
            else
              echo "WORKFLOW_AUTO_UPDATE=true" >> "${GITHUB_ENV}"
              echo "LATEST_VERSION=${LATEST_VERSION}" >> "${GITHUB_ENV}"
            fi
          else
            echo "tag ${LATEST_VERSION_SEMVER} is null!"
          fi

      - name: init / base64 nested json
        if: env.WORKFLOW_AUTO_UPDATE == 'true'
        uses: actions/github-script@62c3794a3eb6788d9a2a72b219504732c0c9a298
        with:
          script: |
            const { Buffer } = require('node:buffer');
            const { inspect } = require('node:util');

            const LATEST_VERSION = {
              original:'${{ env.LATEST_VERSION }}'
            };
            LATEST_VERSION.semver = LATEST_VERSION.original.replace(/-/ig, ".").split("T")[0];
            const etc = {
              dockerfile:"mc.dockerfile",
              tag:"mc",
              version:LATEST_VERSION.semver,
              build:{
                args:{
                  version_build:LATEST_VERSION.original.split("T")[1],
                }
              },
              semver:{disable:{rolling: true}}
            };
            core.exportVariable('WORKFLOW_BASE64JSON', Buffer.from(JSON.stringify(etc)).toString('base64'));

            // print
              core.info(inspect({etc:etc, LATEST_VERSION:LATEST_VERSION}, {showHidden:false, depth:null, colors:true}));

      - name: build docker image
        if: env.WORKFLOW_AUTO_UPDATE == 'true'
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 #v1.3.1
        with:
          wait-for-completion: false
          workflow: org.container.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "release":"false", "readme":"false", "run-name":"mc", "etc":"${{ env.WORKFLOW_BASE64JSON }}" }'